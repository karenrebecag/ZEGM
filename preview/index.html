<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZEGM · Inicio</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    /* Host neutro simulado: el host real (Elementor) impone su propio reset/fuente. */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body>
  <!-- Embed idéntico al del host: un mount + el loader de jsDelivr. El src del loader se
       pinnea al tag del release con pin-previews.mjs (correr antes de push). -->
  <div data-aa-mount data-aa-theme="light" data-aa-lang="es" data-aa-page="home"></div>
  <script data-cfasync="false"
    src="https://cdn.jsdelivr.net/gh/karenrebecag/ZEGM@v1.0.5/loader.js"></script>
</body>
</html>
