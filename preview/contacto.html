<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZEGM · Contacto</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body>
  <!-- El mapa necesita un token público (pk.) de Mapbox. NO se hornea en el repo:
       para el preview, agrega el token en el atributo de abajo (data-aa-mapbox-token)
       o pásalo en la URL con ?mbtoken=pk.xxxx. Sin token, la página carga pero el
       mapa queda vacío (degrada en silencio). -->
  <div data-aa-mount data-aa-theme="light" data-aa-lang="es" data-aa-page="contacto"></div>
  <!-- src del loader pinneado al tag del release por pin-previews.mjs (antes de push). -->
  <script data-cfasync="false"
    src="https://cdn.jsdelivr.net/gh/karenrebecag/ZEGM@v1.0.2/loader.js"></script>
</body>
</html>
