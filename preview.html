<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZEGM</title>

  <!-- Estilos del bundle local (dev) -->
  <link rel="stylesheet" href="/dist/landing.css" />

  <style>
    /* El DS usa --aa-font propio; el host real puede imponer otra fuente. Aquí
       simulamos un host neutro con una sans moderna para el preview. */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body>

  <!-- Embed realista: un solo mount, igual que en el host.
       Las secciones declaran su propio strip (data-aa-section-theme).
       Idioma conmutable con ?lang=en -->
  <div data-aa-mount data-aa-theme="light" data-aa-lang="es"></div>

  <!-- Bundle local (npm run dev) -->
  <script type="module" src="/dist/landing.js"></script>
</body>
</html>
